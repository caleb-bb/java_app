# Like any application, this Spring Boot project is going to have some config
# that we shouldn't hardcode. Things like db URLs, for example, port numbers,
# feature flags, passwords and other credentials, timeout limits, etc.
# `application.properties` is where Spring Boot likes to keeps its config. As
# with most other frameworks, config consists of key-value pairs. In this case,
# it's a flat list, so no JSON or YAML-style nesting.
#
# This particular format is the Java `.properties` format, which is very old. It
# dates to the 90s. Dots are naming conventions here, not actual hierartchies,
# so spring.kafka.bootstrap-servers is one flat key. Spring Boot uses these dots
# to group related config visually, but to Java they're just flat keys.
#
# Spring Boot's auto-configuration classes look for specific keys. When you add
# spring-kafka to your dependencies in `pom.xml`, Spring Boot registers a
# KafkaAUtoConfiguration class that checks for keys starting with
# `spring.kafka.*`. If it finds, e.g.
# `spring.kafka.bootstrap-servers=localhost:9092`, then that value will be used
# to configure the KafkaTEmplate bean it creates. Spring reads all this and
# wires it behind the scenes. The ${stuff} synta tells Java to replace the ${}
# expression with the contents of `stuff`.
#
# So, if we have `spring-kafka` on the classpath, we'll have a KafkaTempalte
# bean. The first line of config here,
# spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers}
# tells that bean to send messages to the embedded broker started by the test.
# Without this, the template either fails or defaults to localhost:9092.

spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
